    <!-- Analytics + Pixel loaded lazily after first paint to protect LCP.
         Stubs preserve any early calls so nothing throws. -->
    <script>
      // gtag stub — queues calls until GA script actually loads.
      window.dataLayer = window.dataLayer || [];
      window.gtag = function(){ window.dataLayer.push(arguments); };
      window.gtag('js', new Date());
      window.gtag('config', 'G-3DJ1C5CKBK', { send_page_view: false });

      // fbq stub — queues events until the real Pixel script loads.
      (function(){
        var n = window.fbq = function(){
          n.callMethod ? n.callMethod.apply(n, arguments) : n.queue.push(arguments);
        };
        if (!window._fbq) window._fbq = n;
        n.push = n; n.loaded = true; n.version = '2.0'; n.queue = [];
      })();
      window.fbq('init', '1489757443152828');
      window.fbq('track', 'PageView');

      // Inject third-party scripts as soon as the browser is idle after first
      // paint — no artificial delay, so PageView/Lead/Purchase events flush
      // reliably even on bounces. Scripts are async so they never block LCP.
      function __loadAnalytics(){
        if (window.__lovableAnalyticsLoaded) return;
        window.__lovableAnalyticsLoaded = true;
        var ga = document.createElement('script');
        ga.async = true;
        ga.src = 'https://www.googletagmanager.com/gtag/js?id=G-3DJ1C5CKBK';
        document.head.appendChild(ga);
        var fb = document.createElement('script');
        fb.async = true;
        fb.src = 'https://connect.facebook.net/en_US/fbevents.js';
        document.head.appendChild(fb);
      }
      if ('requestIdleCallback' in window) {
        requestIdleCallback(__loadAnalytics, { timeout: 1500 });
      } else {
        setTimeout(__loadAnalytics, 200);
      }
    </script>

    <!-- Default meta tags (overridden by react-helmet-async per page) -->
    <title>ArabiyaPath - Master Arabic the Natural Way</title>
